
<html>
<head>
  <title>Virtual Chemistry Lab</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Virtual Chemistry Lab</h1>

<div class="log-bar">
  <form onsubmit="submitData(event)">
    <input type="text" id="name" placeholder="Name" required>
    <input type="text" id="roll" placeholder="Roll No" required>
    <input type="text" id="section" placeholder="Section" required>
    <button type="submit">Submit</button>
    <button type="reset">Clear</button>
  </form>
</div>

<div class="shelf">
  <div class="chemical c1" draggable="true" id="HCl">HCl (Acid)</div>
  <div class="chemical c2" draggable="true" id="NaOH">NaOH (Base)</div>
  <div class="chemical c3" draggable="true" id="Water">H₂O (Water)</div>
  <div class="chemical c4" draggable="true" id="Peroxide">H₂O₂ (Peroxide)</div>
  <div class="chemical c5" draggable="true" id="Salt">NaCl (Salt)</div>
  <div class="chemical c6" draggable="true" id="Ethanol">EtOH (Ethanol)</div>
</div>

<div class="workbench">

  <div class="drop-zone" ondragover="allowDrop(event)" ondrop="drop(event)">
    <h3>Beaker A</h3>
    <img src="bebu.png" width="80">
    <div class="result"></div>
  </div>

  <div class="drop-zone" ondragover="allowDrop(event)" ondrop="drop(event)">
    <h3>Beaker B</h3>
    <img src="bebu.png" width="80">
    <div class="result"></div>
  </div>

  <div class="drop-zone" ondragover="allowDrop(event)" ondrop="drop(event)">
    <h3>Flask C</h3>
    <img src="bebu2.png" width="100">
    <div class="result"></div>
  </div>

</div>

<button class="reset-btn" onclick="resetExperiment()">
  Reset Entire Experiment
</button>

<script src="script.js"></script>

</body>
</html>
